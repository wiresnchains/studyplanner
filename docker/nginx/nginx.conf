user nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 4096;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    ##
    # Basic settings
    ##

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL settings
    ##
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_prefer_server_ciphers off;
    ssl_session_tickets off;

    ##
    # Logging settings
    ##

    access_log /var/log/nginx/access.log;

    ##
    # Gzip settings
    ##

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    ##
    # Virtual Host Configs
    ##

    # Redirect HTTP traffics to HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Proxy to tomcat webapp
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name studyplanner.wiresnchains.com;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        ssl_certificate /etc/shared_certs/live/studyplanner/fullchain.pem;
        ssl_certificate_key /etc/shared_certs/live/studyplanner/privkey.pem;

        location / {
            proxy_pass http://tomcat:8080/studyplanner;
            proxy_set_header Connection $http_connection;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
